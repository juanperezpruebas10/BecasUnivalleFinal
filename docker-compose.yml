services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Univalle
      MYSQL_DATABASE: sistema_becas
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pUnivalle"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: Univalle
      DB_NAME: sistema_becas
      JWT_SECRET: univalle_becas_secret_key_2024
      JWT_EXPIRE: 7d
    volumes:
      - uploads_data:/app/uploads

  client:
    build: ./client
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
